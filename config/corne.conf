# Corne Keyboard ZMK Configuration
# github.com/andreiveisuade/zmk-corne-layout

# Enable mouse keys (required for Layer 5 scroll via D+F combo)
CONFIG_ZMK_MOUSE=y

# Display support (Nice!View)
CONFIG_ZMK_DISPLAY=y

# Increase combo timeout if needed (default 50ms)
# CONFIG_ZMK_COMBO_MAX_COMBOS_PER_KEY=5

# Bluetooth
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5

# Deep sleep timeout (ms) - 30 minutes
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000
